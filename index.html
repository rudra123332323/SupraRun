<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supra Dashboard Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="mission-popup" id="popup">
    <div class="mission-box">
        <h1>MISSION START</h1>
        <p>Start the Supra and hit the highway.</p>
         <p>Raise the Volume to full for experience 🔊</p>
        <button id="enterGame">START ENGINE</button>
    </div>
</div>
    <div class="rotate-msg">
        📱 Rotate your phone for best experience 🎮
            Raise to Full Volume 🔊 For Better Expereince
    </div>

    <div class="container" id="container">
        <div class="car">
            <img src="supra.png" alt="">
            <button class="start" id="start">Start Car</button>
            <button class="start" id="pause">Pause Car</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
